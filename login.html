<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Login - Zimbari</title>
    <link rel="stylesheet" href="/src/style.css" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div id="app" class="app-shell">
      <h1>Log in to Your Account</h1>  
      <div id="buttonDiv"></div>
      <script>
        window.onload = function () {
            google.accounts.id.initialize({
                client_id: "945932960900-fbm7qt7mg5ntuf3b2rk8q1nn7s43c022.apps.googleusercontent.com",
                callback: handleCredentialResponse
            });
            google.accounts.id.renderButton(
                document.getElementById("buttonDiv"),
                { theme: "outline", size: "large" }  // Customization options
            );

            google.accounts.id.prompt(); 
        };

        function handleCredentialResponse(response) {
            // The response object contains the authentication credential
            alert("Login Successful! Check console for JWT payload.");
            console.log("JWT:", response.credential);
        }
        </script>
    </div>
    <script type="module" src="/src/modules/pwa.js"></script>
  </body>
</html>
